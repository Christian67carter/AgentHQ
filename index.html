<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Agent HQ: Focus Build</title>
<style>
:root{--g:#1D9E75;--gl:#EAF3DE;--gd:#085041;--am:#BA7517;--al:#FAEEDA;--bl:#185FA5;--bll:#E6F1FB;--rd:#E24B4A;--rl:#FCEBEB;--tl:#0F6E56;--bg:#F2F2F7;--card:#FFF;--tx:#1C1C1E;--tx2:#6C6C70;--tx3:#AEAEB2;--br:rgba(60,60,67,.12);--inp:#F2F2F7;--st:env(safe-area-inset-top,44px);--sb:env(safe-area-inset-bottom,34px);--th:83px;}
[data-dark]{--bg:#1C1C1E;--card:#2C2C2E;--tx:#FFF;--tx2:#AEAEB2;--tx3:#6C6C70;--br:rgba(255,255,255,.1);--inp:#3A3A3C;--gl:#0F3D2A;--al:#3D2800;--bll:#001A3D;--rl:#3D0F0F;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,sans-serif;color:var(--tx);-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;}
.ss{height:var(--st);background:var(--card);flex-shrink:0;}
.hdr{background:var(--card);padding:8px 16px 12px;border-bottom:.5px solid var(--br);flex-shrink:0;display:flex;justify-content:space-between;align-items:flex-end;}
.hdr-l .t{font-size:24px;font-weight:700;letter-spacing:-.5px;}
.hdr-l .s{font-size:12px;color:var(--tx2);margin-top:1px;}
.scrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--th) + 14px);}
.tbar{position:fixed;bottom:0;left:0;right:0;height:var(--th);background:var(--card);border-top:.5px solid var(--br);display:flex;align-items:flex-start;padding-top:10px;z-index:100;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:0 2px;}
.tab svg{width:22px;height:22px;stroke:var(--tx3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.tab .tl{font-size:9px;font-weight:500;color:var(--tx3);}
.tab.on .tl{color:var(--g);}
.tab.on svg{stroke:var(--g);}
.scn{display:none;}
.scn.on{display:block;animation:su .18s ease;}
@keyframes su{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.card{background:var(--card);border-radius:16px;margin-bottom:12px;overflow:hidden;}
.ch{padding:12px 16px 0;font-size:12px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;}
.cb{padding:12px 16px 16px;}
.row{display:flex;align-items:center;padding:13px 16px;gap:12px;border-bottom:.5px solid var(--br);}
.row.stale{background:var(--rl);}
.rc{flex:1;min-width:0;}
.rt{font-size:15px;font-weight:600;color:var(--tx);}
.rs{font-size:12px;color:var(--tx2);margin-top:2px;}
input,select{height:44px;border-radius:10px;border:none;background:var(--inp);padding:0 14px;font-size:16px;color:var(--tx);width:100%;margin-bottom:8px;}
.btn{height:44px;border-radius:10px;border:none;background:var(--g);color:#fff;font-size:15px;font-weight:600;padding:0 18px;cursor:pointer;width:100%;}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.m{background:var(--card);border-radius:14px;padding:12px;}
.mv{font-size:22px;font-weight:700;letter-spacing:-.8px;line-height:1.2;}
.mv.g{color:var(--g);}.mv.r{color:var(--rd);}
.ml{font-size:10px;color:var(--tx2);margin-top:4px;font-weight:600;text-transform:uppercase;}
</style>
</head>
<body>
<div class="ss"></div>
<div class="hdr">
  <div class="hdr-l"><div class="t">Agent HQ</div><div class="s">Organic Growth · Abilene</div></div>
  <div class="hdr-r"><div class="bdg" style="background:var(--bl); color:white; padding:4px 8px; border-radius:8px; font-size:10px;">WARM CIRCLE FOCUS</div></div>
</div>
<div class="scrl">

<div id="scn-daily" class="scn on">
  <div class="mg">
    <div class="m"><div class="mv g" id="m-cv">0</div><div class="ml">Convos</div><div class="ms" style="font-size:10px; color:var(--tx3);">Goal: 20</div></div>
    <div class="m"><div class="mv r" id="total-debt">$93,725</div><div class="ml">Total Debt</div></div>
  </div>
  <div class="card"><div class="ch">Streak Tracker</div><div id="calendar" class="cal-grid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:4px; padding:12px;"></div></div>
  <div class="card"><div class="ch">Quick Log</div><div class="row"><div class="rc"><div class="rt">Conversation Count</div></div><div style="display:flex;gap:12px;"><button onclick="adj('cv',-1)">−</button><span id="s-cv" style="font-weight:700;">0</span><button onclick="adj('cv',1)">+</button></div></div></div>
</div>

<div id="scn-re" class="scn">
  <div class="card"><div class="ch">Active Clients & Leads</div><div id="re-list"></div></div>
  <div class="card"><div class="ch">Add New Lead</div><div class="cb"><input type="text" id="ren" placeholder="Name"><select id="ret"><option value="web">Online Lead</option><option value="referral">Referral</option><option value="other">Other</option></select><button class="btn" onclick="addRE()">Add to Pipeline</button></div></div>
</div>

<div id="scn-pers" class="scn">
  <div class="card"><div class="ch">HSU & Warm Connections</div><div id="pers-list"></div></div>
  <div class="card"><div class="ch">Add Relationship</div><div class="cb"><input type="text" id="pn" placeholder="Name"><input type="text" id="pr" placeholder="e.g. HSU Engineering, 3D Printing Customer"><button class="btn" style="background:var(--bl);" onclick="addPers()">Add to Circle</button></div></div>
</div>

<div id="scn-money" class="scn">
  <div class="mg">
    <div class="m"><div class="mv g" id="mc">0</div><div class="ml">Closings</div></div>
    <div class="m"><div class="mv" id="me">$0</div><div class="ml">ZR1X Fund</div></div>
  </div>
  <div class="card"><div class="ch">Log a Sale</div><div class="cb"><input type="text" id="cln" placeholder="Client Name"><input type="text" id="cla" placeholder="Address"><input type="number" id="clp" placeholder="Price ($)"><button class="btn" onclick="logClose()">Record Closing</button></div></div>
</div>

</div>

<div class="tbar">
  <div class="tab on" onclick="showScn('daily',this)"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg><span class="tl">Daily</span></div>
  <div class="tab" onclick="showScn('re',this)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span class="tl">Leads</span></div>
  <div class="tab" onclick="showScn('pers',this)"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/></svg><span class="tl">Personal</span></div>
  <div class="tab" onclick="showScn('money',this)"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span class="tl">Money</span></div>
</div>

<script>
let S = JSON.parse(localStorage.getItem('AHQ_EASE')) || {cv:0, history:{}, re:[], pers:[], closings:[], zr1x:0, savings:0, truck:64000, sallie:24225, federal:5500};
function save(){ localStorage.setItem('AHQ_EASE', JSON.stringify(S)); render(); }
function showScn(id, el){ document.querySelectorAll('.scn, .tab').forEach(x=>x.classList.remove('on')); document.getElementById('scn-'+id).classList.add('on'); el.classList.add('on'); }
function adj(k,d){ S[k]=Math.max(0,S[k]+d); let t = new Date().toISOString().split('T')[0]; S.history[t] = S.cv; save(); }

function render(){
  document.getElementById('m-cv').innerText = S.cv; document.getElementById('s-cv').innerText = S.cv;
  document.getElementById('total-debt').innerText = '$' + Math.round(S.truck+S.sallie+S.federal).toLocaleString();
  document.getElementById('mc').innerText = S.closings.length;
  document.getElementById('me').innerText = '$' + Math.round(S.zr1x).toLocaleString();
  renderRE(); renderPers(); renderCalendar();
}

function addRE(){ let n=document.getElementById('ren').value; if(!n)return; S.re.unshift({name:n, type:document.getElementById('ret').value, time:Date.now()}); document.getElementById('ren').value=''; save(); }
function addPers(){ let n=document.getElementById('pn').value; if(!n)return; S.pers.unshift({name:n, rel:document.getElementById('pr').value}); document.getElementById('pn').value=''; document.getElementById('pr').value=''; save(); }

function renderRE(){
  document.getElementById('re-list').innerHTML = S.re.map((c,i)=> `<div class="row"><div class="rc"><div class="rt">${c.name}</div><div class="rs">${c.type}</div></div><button onclick="rem('re',${i})">×</button></div>`).join('') || '<div class="cb" style="font-size:12px; color:var(--tx3);">Pipeline empty.</div>';
}

function renderPers(){
  document.getElementById('pers-list').innerHTML = S.pers.map((p,i)=> `<div class="row"><div class="rc"><div class="rt">${p.name}</div><div class="rs">${p.rel}</div></div><button onclick="rem('pers',${i})">×</button></div>`).join('') || '<div class="cb" style="font-size:12px; color:var(--tx3);">Warm circle empty.</div>';
}

function rem(k,i){ S[k].splice(i,1); save(); }

function logClose(){
  let n=document.getElementById('cln').value; let a=document.getElementById('cla').value; let p=parseFloat(document.getElementById('clp').value)||225000;
  if(!n||!a)return;
  let net = (p * 0.03 * 0.70) * 0.70; S.zr1x += (net*0.5); S.closings.push({name:n, address:a, date:new Date().toISOString()});
  document.getElementById('cln').value=''; document.getElementById('cla').value=''; document.getElementById('clp').value=''; save();
}

function renderCalendar(){
  let cal = document.getElementById('calendar'); cal.innerHTML = '';
  let now = new Date(); let first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
  let days = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  for(let i=0; i<first; i++) cal.innerHTML += '<div></div>';
  for(let d=1; d<=days; d++){
    let dt = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let hit = S.history[dt] >= 20;
    cal.innerHTML += `<div style="aspect-ratio:1; border-radius:4px; background:${hit?'var(--g)':'var(--inp)'}; color:${hit?'white':'var(--tx3)'}; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600;">${d}</div>`;
  }
}
window.onload = render;
</script>
</body>
</html>
