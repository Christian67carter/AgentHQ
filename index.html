<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Agent HQ: Pro Playbook</title>
<style>
:root{--g:#1D9E75;--gl:#EAF3DE;--gd:#085041;--am:#BA7517;--al:#FAEEDA;--bl:#185FA5;--bll:#001A3D;--rd:#E24B4A;--rl:#FCEBEB;--tl:#0F6E56;--bg:#F2F2F7;--card:#FFF;--tx:#1C1C1E;--tx2:#6C6C70;--tx3:#AEAEB2;--br:rgba(60,60,67,.12);--inp:#F2F2F7;--st:env(safe-area-inset-top,44px);--sb:env(safe-area-inset-bottom,34px);--th:83px;}
[data-dark]{--bg:#1C1C1E;--card:#2C2C2E;--tx:#FFF;--tx2:#AEAEB2;--tx3:#6C6C70;--br:rgba(255,255,255,.1);--inp:#3A3A3C;--gl:#0F3D2A;--al:#3D2800;--bll:#001A3D;--rl:#3D0F0F;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,sans-serif;color:var(--tx);-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;}
.ss{height:var(--st);background:var(--card);flex-shrink:0;}
.hdr{background:var(--card);padding:8px 16px 12px;border-bottom:.5px solid var(--br);flex-shrink:0;display:flex;justify-content:space-between;align-items:flex-end;}
.hdr-l .t{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.hdr-r .dbtn{width:36px;height:36px;border-radius:50%;border:none;background:var(--inp);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--tx);}
.scrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--th) + 14px);}
.tbar{position:fixed;bottom:0;left:0;right:0;height:var(--th);background:var(--card);border-top:.5px solid var(--br);display:flex;align-items:flex-start;padding-top:10px;z-index:100;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:0 1px;}
.tab svg{width:20px;height:20px;stroke:var(--tx3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tab .tl{font-size:8px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.02em;}
.tab.on .tl{color:var(--g);}
.tab.on svg{stroke:var(--g);}
.scn{display:none;}
.scn.on{display:block;animation:su .18s ease;}
@keyframes su{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.card{background:var(--card);border-radius:16px;margin-bottom:12px;overflow:hidden;}
.ch{padding:12px 16px 0;font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;}
.cb{padding:12px 16px 16px;}
.row{display:flex;flex-direction:column;padding:16px;border-bottom:.5px solid var(--br);}
.rt{font-size:15px;font-weight:700;color:var(--g);margin-bottom:6px;}
.rs{font-size:14px;color:var(--tx);line-height:1.5;}
.rcxt{font-size:11px;color:var(--tx3);margin-top:8px;font-style:italic;}
input,textarea{width:100%;background:var(--inp);border:none;border-radius:10px;padding:12px;color:var(--tx);font-size:15px;margin-bottom:10px;outline:none;}
textarea{height:80px;resize:none;}
.btn{height:44px;border-radius:10px;border:none;background:var(--g);color:#fff;font-size:15px;font-weight:600;padding:0 18px;cursor:pointer;width:100%;}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.m{background:var(--card);border-radius:14px;padding:12px;}
.mv{font-size:20px;font-weight:700;}
.cal-d.hit{background:var(--g);color:#fff;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:12px;}
.cal-d{aspect-ratio:1;border-radius:4px;background:var(--inp);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--tx3);}
</style>
</head>
<body>
<div class="ss"></div>
<div class="hdr">
  <div class="hdr-l"><div class="t">Agent HQ</div><div class="s" style="font-size:10px; color:var(--tx2);">Christian · PLACE Playbook</div></div>
  <div class="hdr-r"><button class="dbtn" onclick="toggleDark()">☀️</button></div>
</div>
<div class="scrl">

<div id="scn-daily" class="scn on">
  <div class="mg">
    <div class="m"><div class="mv" id="m-cv" style="color:var(--g);">0</div><div style="font-size:10px; font-weight:700; color:var(--tx2);">CONVOS</div></div>
    <div class="m"><div class="mv" id="total-debt" style="color:var(--rd);">$93,725</div><div style="font-size:10px; font-weight:700; color:var(--tx2);">TOTAL DEBT</div></div>
  </div>
  <div class="card"><div class="ch">Streak Tracker</div><div id="calendar" class="cal-grid"></div></div>
  <div class="card"><div class="ch">Input</div><div style="padding:16px; display:flex; justify-content:space-between; align-items:center;"><span>Add Conversation</span><div style="display:flex; gap:12px;"><button onclick="adj('cv',-1)">−</button><span id="s-cv">0</span><button onclick="adj('cv',1)">+</button></div></div></div>
</div>

<div id="scn-scripts" class="scn">
  <div class="card">
    <div class="ch">Abilene Pro Scripts</div>
    <div id="script-list"></div>
  </div>
  <div class="card">
    <div class="ch">Add Custom Script</div>
    <div class="cb">
      <input type="text" id="stitle" placeholder="Scenario (e.g. Price Objection)">
      <textarea id="sbody" placeholder="What do you say?"></textarea>
      <button class="btn" onclick="addScript()">Save Script</button>
    </div>
  </div>
</div>

<div id="scn-re" class="scn">
  <div class="card"><div class="ch">Pipeline</div><div id="re-list"></div></div>
  <div class="card"><div class="ch">New Lead</div><div class="cb"><input type="text" id="ren" placeholder="Name"><button class="btn" onclick="addRE()">Add Lead</button></div></div>
</div>

<div id="scn-money" class="scn">
  <div class="mg">
    <div class="m"><div class="mv" id="mc" style="color:var(--g);">0</div><div style="font-size:10px; font-weight:700; color:var(--tx2);">CLOSINGS</div></div>
    <div class="m"><div class="mv" id="me">$0</div><div style="font-size:10px; font-weight:700; color:var(--tx2);">ZR1X FUND</div></div>
  </div>
  <div class="card"><div class="ch">Log Sale</div>
    <div class="cb">
      <input type="text" id="cln" placeholder="Client Name">
      <input type="date" id="cdate">
      <input type="number" id="clp" placeholder="Price">
      <button class="btn" onclick="logClose()">Record</button>
    </div>
  </div>
</div>

</div>

<div class="tbar">
  <div class="tab on" onclick="showScn('daily',this)"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg><span class="tl">Daily</span></div>
  <div class="tab" onclick="showScn('scripts',this)"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span class="tl">Scripts</span></div>
  <div class="tab" onclick="showScn('re',this)"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span class="tl">Leads</span></div>
  <div class="tab" onclick="showScn('money',this)"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span class="tl">Money</span></div>
</div>

<script>
let S = JSON.parse(localStorage.getItem('AHQ_SCRIPT_V1')) || {
  dark:true, cv:0, history:{}, re:[], closings:[], zr1x:0, 
  truck:64000, sallie:24225, federal:5500,
  scripts: [
    {t: "The 'I'm a Student' Edge", b: "Honestly, I'm finishing my engineering degree at HSU, so I look at houses like a project—I'm more focused on the structural integrity and the math than just 'selling' you. If you want someone to geek out on the inspections with you, I'm your guy.", c: "Use with: HSU connections / Young families"},
    {t: "The Dyess Soft Intro", b: "Hey, I saw you guys might be heading to Dyess soon. Most people just show you houses, but I know the base area really well. My goal is to make sure your BAH actually builds you some equity while you're stationed here in Abilene.", c: "Use with: Military leads"},
    {t: "Home Anniversary Text", b: "Hey! Happy 1-year 'Home-iversary.' I was just checking my records and realized it's been exactly a year since you moved into [Address]. Hope you're still loving it—if you need a contractor recommendation or just want to know what the house is worth now, let me know!", c: "Use for: Past clients"}
  ]
};

function save(){ localStorage.setItem('AHQ_SCRIPT_V1', JSON.stringify(S)); render(); }
function toggleDark(){ S.dark=!S.dark; applyDark(); save(); }
function applyDark(){ document.documentElement.toggleAttribute('data-dark', S.dark); document.querySelector('.dbtn').innerText = S.dark ? '☀️' : '🌙'; }
function showScn(id, el){ document.querySelectorAll('.scn, .tab').forEach(x=>x.classList.remove('on')); document.getElementById('scn-'+id).classList.add('on'); el.classList.add('on'); }
function adj(k,d){ S[k]=Math.max(0,S[k]+d); let t = new Date().toISOString().split('T')[0]; S.history[t] = S.cv; save(); }

function render(){
  document.getElementById('m-cv').innerText = S.cv; document.getElementById('s-cv').innerText = S.cv;
  document.getElementById('total-debt').innerText = '$' + Math.round(S.truck+S.sallie+S.federal).toLocaleString();
  document.getElementById('mc').innerText = S.closings.length;
  document.getElementById('me').innerText = '$' + Math.round(S.zr1x).toLocaleString();
  
  document.getElementById('script-list').innerHTML = S.scripts.map(s => `
    <div class="row">
      <div class="rt">${s.t}</div>
      <div class="rs">${s.b}</div>
      <div class="rcxt">${s.c}</div>
    </div>
  `).join('');

  document.getElementById('re-list').innerHTML = S.closings.map(c => `<div class="row"><div class="rt" style="font-size:14px;">${c.name} (Closed)</div></div>`).join('') + S.re.map(r => `<div class="row"><div class="rt" style="font-size:14px;">${r.name} (Lead)</div></div>`).join('');
  
  renderCalendar();
}

function addScript(){
  let t = document.getElementById('stitle').value;
  let b = document.getElementById('sbody').value;
  if(t && b){ S.scripts.unshift({t:t, b:b, c:"Custom Script"}); document.getElementById('stitle').value=''; document.getElementById('sbody').value=''; save(); }
}

function logClose(){
  let n=document.getElementById('cln').value; let p=parseFloat(document.getElementById('clp').value)||225000;
  if(n){ let net=(p*0.03*0.7)*0.7; S.zr1x+=(net*0.5); S.closings.push({name:n, date:document.getElementById('cdate').value}); save();}
}

function addRE(){ let n=document.getElementById('ren').value; if(n){S.re.unshift({name:n}); document.getElementById('ren').value=''; save();}}

function renderCalendar(){
  let cal = document.getElementById('calendar'); cal.innerHTML = '';
  let now = new Date(); let first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
  let days = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  for(let i=0; i<first; i++) cal.innerHTML += '<div></div>';
  for(let d=1; d<=days; d++){
    let dt = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let hit = S.history[dt] >= 20;
    cal.innerHTML += `<div class="cal-d ${hit?'hit':''}">${d}</div>`;
  }
}
window.onload = () => { applyDark(); render(); };
</script>
</body>
</html>
