<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Agent HQ Ultra</title>
<style>
/* ... (All previous iOS Styles remain the same) ... */
:root{
  --g:#1A2744;--gl:#F5EDD6;--gd:#0F1A2E;
  --am:#C9A84C;--al:#F5EDD6;
  --bl:#1A2744;--bll:#EEE8D6;
  --rd:#B94040;--rl:#FBEDED;
  --pu:#5A3472;--pul:#EDE0F0;
  --bg:#F2F2F7;--card:#FFFFFF;--tx:#000000;--tx2:#8E8E93;--tx3:#C7C7CC;
  --br:rgba(60,60,67,.12);--inp:#F2F2F7;
  --ios-red:#FF3B30; --ios-blue:#007AFF;
  --st:env(safe-area-inset-top,44px);--th:83px;
}
[data-dark]{
  --bg:#000000;--card:#1C1C1E;--tx:#FFFFFF;--tx2:#8E8E93;--tx3:#48484A;
  --br:rgba(255,255,255,.1);--inp:#2C2C2E;
  --ios-red:#FF453A; --ios-blue:#0A84FF;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,sans-serif;color:var(--tx);}
body{display:flex;flex-direction:column;}
.ss{height:var(--st);background:var(--card);flex-shrink:0;}
.scrl{flex:1;overflow-y:auto;padding:14px 14px calc(var(--th) + 40px);}
.tbar{position:fixed;bottom:0;left:0;right:0;height:var(--th);background:var(--card);border-top:.5px solid var(--br);display:flex;padding-top:10px;z-index:100;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
.tab svg{width:22px;height:22px;stroke:var(--tx2);fill:none;stroke-width:1.8;}
.tab.on svg{stroke:var(--ios-blue);} .tab.on .tl{color:var(--ios-blue);}
.tab .tl{font-size:9px;font-weight:500;color:var(--tx2);}
.scn{display:none;} .scn.on{display:block;}
.card{background:var(--card);border-radius:16px;margin-bottom:12px;padding:16px;}
.btn{height:44px;border-radius:10px;border:none;background:var(--ios-blue);color:#fff;font-size:15px;font-weight:600;width:100%;cursor:pointer;}
.file-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:.5px solid var(--br);}
</style>
</head>
<body>

<div class="ss"></div>

<div class="scrl">
  <div id="scn-daily" class="scn on">
    <div id="perf-tracker" style="background:var(--card);border-left:4px solid var(--rd);border-radius:12px;padding:14px 18px;margin-bottom:16px;">
      <div id="perf-title" style="font-weight:700;">CONNECTING TO CLOUD...</div>
      <div id="perf-desc" style="font-size:13px;color:var(--tx2);">Fetching your Remote Config goal.</div>
    </div>
    </div>

  <div id="scn-vault" class="scn">
    <h2 style="margin-bottom:16px;">Document Vault</h2>
    <div class="card">
      <p style="font-size:13px;color:var(--tx2);margin-bottom:10px;">Upload Contracts or Printer Maintenance Photos</p>
      <input type="file" id="vault-upload" style="margin-bottom:10px;">
      <button class="btn" onclick="uploadToVault()">Upload to Cloud Storage</button>
    </div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:10px;">Cloud Files</div>
      <div id="file-list"></div>
    </div>
  </div>
</div>

<div class="tbar">
  <div class="tab on" onclick="showScn('daily',this)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span class="tl">Daily</span></div>
  <div class="tab" onclick="showScn('vault',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg><span class="tl">Vault</span></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL, listAll } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { getRemoteConfig, fetchAndActivate, getValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-remote-config.js";
import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRl0xHETygH2XYB8lWzWOPoGFrzI-zqwg",
  authDomain: "agenthq-3c2c9.firebaseapp.com",
  databaseURL: "https://agenthq-3c2c9-default-rtdb.firebaseio.com",
  projectId: "agenthq-3c2c9",
  storageBucket: "agenthq-3c2c9.firebasestorage.app",
  messagingSenderId: "91185374523",
  appId: "1:91185374523:web:fef9123905c7d416d1831e",
  measurementId: "G-RG2X93GXFH"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);
const remoteConfig = getRemoteConfig(app);
const analytics = getAnalytics(app);

// 1. REMOTE CONFIG: Fetch Goal
remoteConfig.settings.minimumFetchIntervalMillis = 3600000;
let dailyGoal = 20;

fetchAndActivate(remoteConfig).then(() => {
  dailyGoal = getValue(remoteConfig, "daily_convo_goal").asNumber() || 20;
  updateUI();
});

// 2. ANALYTICS: Track Tab Usage
window.showScn = (id, el) => {
  logEvent(analytics, 'screen_view', { screen_name: id });
  document.querySelectorAll('.scn').forEach(s => s.classList.remove('on'));
  document.getElementById('scn-' + id).classList.add('on');
};

// 3. STORAGE: Upload Logic
window.uploadToVault = async () => {
  const file = document.getElementById('vault-upload').files[0];
  if (!file) return;
  const storageRef = sRef(storage, 'vault/' + file.name);
  await uploadBytes(storageRef, file);
  alert("File saved to Cloud Storage!");
  loadFileList();
};

async function loadFileList() {
  const listRef = sRef(storage, 'vault/');
  const res = await listAll(listRef);
  const fileList = document.getElementById('file-list');
  fileList.innerHTML = '';
  for (const item of res.items) {
    const url = await getDownloadURL(item);
    fileList.innerHTML += `<div class="file-row"><span>${item.name}</span><a href="${url}" target="_blank" style="color:var(--ios-blue)">View</a></div>`;
  }
}

// 4. DATABASE & CLOUD SYNC
const S = { cv: 0, dr: 0, nc: 0 }; // Simplified for example
const dbRef = ref(db, 'agent_hq_data');

onValue(dbRef, (snapshot) => {
  const data = snapshot.val();
  if (data) { Object.assign(S, data); updateUI(); }
});

function updateUI() {
  document.getElementById('perf-title').textContent = S.cv >= dailyGoal ? "GOAL MET" : "KEEP PUSHING";
  // ... (Previous UI update logic remains) ...
}

loadFileList();
</script>
</body>
</html>
